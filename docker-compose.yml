version: '3.8'

services:
  backend:
    build:
      context: ./core
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./vi_sense.db
      - SECRET_KEY=your-secret-key-here
    volumes:
      - ./core:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: sqlite3:latest
    volumes:
      - ./data:/data
    command: ["sqlite3", "/data/vi_sense.db"]